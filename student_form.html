<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        /* Basic styling to keep the form clean and centered */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f9f9f9; }
        form { max-width: 600px; padding: 25px; border: 1px solid #ddd; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px 25px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>New Student Registration</h2>
    
    <form action="process_form.php" method="POST">
        
        <input type="hidden" name="action" value="create">
        
        <div class="field">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter student name" required>
        </div>

        <div class="field">
            <label>Student ID</label>
            <input type="text" name="student_id" placeholder="e.g. 2024CS001" required>
        </div>

        <div class="field">
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
        </div>

        <div class="field">
            <label>Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="field">
            <label>Residential Address</label>
            <textarea name="address" rows="3" placeholder="Full address here..."></textarea>
        </div>

        <div class="field">
            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="10-digit number" required>
        </div>

        <div class="field">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="email@university.edu" required>
        </div>

        <div class="field">
            <label>Select Department</label>
            <select name="dept_id" required>
                <option value="">-- Choose Department --</option>
                <option value="1">Computer Science (1)</option>
                <option value="2">Information Technology (2)</option>
                <option value="3">Mechanical Engineering (3)</option>
            </select>
        </div>
        
        <button type="submit">Save Student Record</button>
    </form>
</body>
</html>
